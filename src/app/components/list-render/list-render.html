<div class="list-render">
  <section class="animal-section animal-section--legacy">
    <h2>Animais: legado</h2>
    <ul>
      <li *ngFor="let animal of animals">
        <span class="animal-name">{{ animal.name }}</span>
        <span class="animal-type">{{ animal.type }}</span>
        <span class="animal-age">{{ animal.age }}</span>
        <button (click)="showAge(animal)" class="animal-button">Mostrar Idade</button>
      </li>
    </ul>
    <h2 style="color: white; font-size: 1.2rem; font-weight: bold;  padding: 10px; border-radius: 5px;">{{ showDetails }}</h2>
  </section>

  <section class="animal-section animal-section--modern">
    <h2>Animais: Angular 17+</h2>
    <ul>
      @for (animal of animals; track animal.name) {
        <li>
          <span class="animal-name">{{ animal.name }}</span>
          <span class="animal-type">{{ animal.type }}</span>
          <span class="animal-age">{{ animal.age }}</span>
          <button (click)="showAge(animal)" class="animal-button">Mostrar Idade</button>
        </li>
      }
    </ul>
    <h2 style="color: white; font-size: 1.2rem; font-weight: bold; padding: 10px; border-radius: 5px;">{{ showDetails }}</h2>
  </section>
  <button (click)="removeAnimal()" class="remove-button">Remover Animal</button>
</div>
